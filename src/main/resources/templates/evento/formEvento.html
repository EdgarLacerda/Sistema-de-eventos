<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EventoApp</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal: #0f9e8a;
            --teal-light: #e6f7f5;
            --teal-dark: #0a6e60;
            --ink: #1a1a1a;
            --ink-soft: #555;
            --ink-muted: #999;
            --border: #e8e8e8;
            --surface: #fafafa;
            --white: #ffffff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
        }

        /* TOP BAR */
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--teal);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .topbar-back {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-soft);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.15s;
        }
        .topbar-back:hover { background: var(--surface); color: var(--ink); }

        /* LAYOUT */
        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* PAGE HEADER */
        .page-header { margin-bottom: 1.5rem; }
        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: var(--ink);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .page-subtitle { font-size: 14px; color: var(--ink-muted); }

        /* CARD */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* FORM */
        .form-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: var(--white);
            outline: none;
            transition: border-color 0.15s;
            appearance: none;
            -webkit-appearance: none;
        }
        .field input:focus { border-color: var(--teal); }
        .field input[type="date"],
        .field input[type="time"] {
            color: var(--ink);
        }

        /* FORM FOOTER */
        .form-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            background: var(--surface);
        }

        .btn-cancel {
            padding: 9px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink-soft);
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-cancel:hover { background: var(--border); color: var(--ink); }

        .btn-save {
            padding: 9px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: white;
            background: var(--teal);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-save:hover { background: var(--teal-dark); }
    </style>
</head>
<body>

    <nav class="topbar">
        <a href="/eventos" class="topbar-logo">EventoApp</a>
        <a href="/eventos" class="topbar-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Voltar aos eventos
        </a>
    </nav>

    <main class="page">

        <div class="page-header">
            <h1 class="page-title">Novo evento</h1>
            <p class="page-subtitle">Preencha os dados para cadastrar um novo evento.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Dados do evento</span>
            </div>

            <form method="post">
                <div class="form-body">

                    <div class="field">
                        <label for="nome">Nome do evento</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: Formatura de Engenharia"/>
                    </div>

                    <div class="field">
                        <label for="local">Local</label>
                        <input type="text" id="local" name="local" placeholder="Ex: Centro de Convenções"/>
                    </div>

                    <div class="row-2">
                        <div class="field">
                            <label for="data">Data</label>
                            <input type="date" id="data" name="data"/>
                        </div>
                        <div class="field">
                            <label for="horario">Horário</label>
                            <input type="time" id="horario" name="horario"/>
                        </div>
                    </div>

                </div>

                <div class="form-footer">
                    <a href="/eventos" class="btn-cancel">Cancelar</a>
                    <button type="submit" class="btn-save">Salvar evento</button>
                </div>
            </form>
        </div>

    </main>

</body>
</html>
